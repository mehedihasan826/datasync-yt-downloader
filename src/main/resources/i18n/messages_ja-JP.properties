# Japanese translations for DataSync YT Downloader
setup.title=DataSync YT Downloader 設定
setup.welcome.title=DataSync YT Downloader へようこそ
setup.welcome.desc=DataSync YT Downloader は、yt-dlp を使用して YouTube 音声をローカルにダウンロードし、ミュージックライブラリや共有クラウドフォルダと同期します。
setup.welcome.privacy_summary=<strong>プライバシーに関する注意:</strong> このアプリケーションは完全にローカルで動作します。データベース、クラウド認証、または外部制御サーバーは使用しません。すべてのダウンロードはこのコンピューター上で直接処理されます。YouTube リンクは yt-dlp によって処理されます。Google ドライブの同期は Google ドライブ デスクトップ版によって処理されます。
setup.welcome.accept_privacy=プライバシーポリシーとローカル使用条件を読み、同意します。
setup.welcome.existing_config=既存の設定ファイルが検出されました。設定をインポートしますか？
setup.welcome.import_btn=既存の設定をインポートする

setup.mode.title=セットアップモードの選択
setup.mode.desc=このコンピューターの役割を選択してください。Google ドライブを使用しない場合は、シンプルなローカルモードを選択してください。
setup.mode.local_mac.title=シンプルなローカル Mac
setup.mode.local_mac.desc=Mac 1台のみ。Google ドライブは不要。ダウンロードファイルは直接 Apple Music に追加されます。
setup.mode.local_win.title=シンプルなローカル Windows
setup.mode.local_win.desc=Windows PC 1台のみ。Google ドライブは不要。ダウンロードファイルは Windows の Apple Music フォルダに保存されます。
setup.mode.master_mac.title=Mac マスター + Google ドライブ同期
setup.mode.master_mac.desc=Mac 側で Apple Music にインポートします。他のセカンダリマシンは共有の Ready フォルダにダウンロードし、Mac がそれをインポートします。
setup.mode.master_win.title=Windows マスター + Google ドライブ同期
setup.mode.master_win.desc=Windows 側で Apple Music にインポートします。他のセカンダリマシンは共有の Ready フォルダにダウンロードします。
setup.mode.secondary.title=セカンダリダウンローダー
setup.mode.secondary.desc=共有の Google ドライブ Ready フォルダにダウンロードします。マスターマシンが後でインポートします。
setup.mode.custom.title=カスタム設定
setup.mode.custom.desc=詳細なパスを手動で設定します。

setup.folders.title=フォルダ設定
setup.folders.desc=ダウンロードとインポートのディレクトリパスを確認・設定します。
setup.folders.gdrive_missing=このセットアップモードには Google ドライブ デスクトップ版が必要です。Google ドライブ デスクトップ版をインストールしてログインするか、シンプルなローカルモードを選択してください。
setup.folders.apple_music_win_prereq=最初に Microsoft Store から Apple Music と Apple Devices をインストールしてください。
setup.folders.apple_music_mac_missing=Apple Music の「読み込み」フォルダ（Automatically Add to Music）が検出されませんでした。Apple Music を一度開いてから、検出を再試行してください。
