setup.welcome.privacy_summary=<strong>গোপনীয়তা নোটিশ:</strong> এই অ্যাপ্লিকেশনটি সম্পূর্ণ লোকালি চলে। এটি কোন ডাটাবেস, ক্লাউড প্রমাণীকরণ বা বাহ্যিক নিয়ন্ত্রণ সার্ভার ব্যবহার করে না। সমস্ত ডাউনলোড সরাসরি এই কম্পিউটারে প্রক্রিয়া করা হয়। ইউটিউব লিঙ্কগুলি yt-dlp দ্বারা প্রক্রিয়া করা হয়। গুগল ড্রাইভ সিঙ্ক গুগল ড্রাইভ ডেক্সটপ দ্বারা নিয়ন্ত্রিত হয়।
