setup.extension.title=Browser Extension Setup
setup.extension.desc=The browser extension adds an inline download button to YouTube.
setup.extension.instructions=To install the extension:\n1. Open your browser extensions settings (chrome://extensions or edge://extensions).\n2. Enable "Developer Mode" (top-right).\n3. Click "Load unpacked".\n4. Select the browser-extension directory in this project's folder.
