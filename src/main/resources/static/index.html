<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataSync YT Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container main-card">
        <h1>DataSync <span>Downloader</span></h1>
        <p class="subtitle">Download and import music seamlessly to your local library.</p>

        <div id="system-status" class="system-status hidden" style="flex-direction: column; align-items: flex-start; gap: 6px;">
            <div class="status-item"><span class="label">Mode:</span> <span id="stat-mode" class="value" style="font-weight: 600; color: var(--accent-color);">-</span></div>
            <div class="status-item"><span class="label">Role:</span> <span id="stat-role" class="value">-</span></div>
            <div class="status-item"><span class="label">Import:</span> <span id="stat-import" class="value">-</span></div>
            <div class="status-item"><span class="label">Sync:</span> <span id="stat-sync" class="value">-</span></div>
            <div class="status-item"><span class="label">Archive:</span> <span id="stat-archive" class="value">-</span></div>
        </div>

        <div id="file-stats" class="file-stats hidden">
            <div class="stat-card">
                <div class="stat-num" id="count-ready">0</div>
                <div class="stat-label">Ready</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="count-imported">0</div>
                <div class="stat-label">Imported</div>
            </div>
            <div class="stat-card">
                <div class="stat-num error-text" id="count-failed">0</div>
                <div class="stat-label">Failed</div>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="url-input" placeholder="Paste YouTube Video or Playlist URL here...">
            <div class="actions">
                <button id="btn-video" class="btn primary">Download Audio</button>
                <button id="btn-playlist" class="btn secondary">Download Playlist / Mix</button>
            </div>
        </div>
        
        <div id="error-msg" class="error-msg hidden"></div>
        
        <div class="cleanup-section">
            <button id="btn-cleanup" class="btn outline" style="margin-bottom: 8px;">Delete Imported backups older than retention days</button>
            <button id="btn-cleanup-all" class="btn outline" style="border-color: var(--error); color: var(--error);">Delete all Imported backups now</button>
            <p class="warning-text">Warning: Cleanup never deletes Apple Music files or archive.txt. It only deletes temporary Google Drive backups.</p>
        </div>

        <h2>Recent Jobs</h2>
        <div id="jobs-container" class="jobs-container">
            <div class="loading-pulse">Loading jobs...</div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
