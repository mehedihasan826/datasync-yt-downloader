# English translations for DataSync YT Downloader
setup.title=DataSync YT Downloader Setup
setup.welcome.title=Welcome to DataSync YT Downloader
setup.welcome.desc=DataSync YT Downloader downloads YouTube audio locally using yt-dlp and syncs it with your music library or shared cloud folders.
setup.welcome.privacy_summary=<strong>Privacy Notice:</strong> This application runs entirely locally. It does not use databases, cloud auth, or external control servers. All downloads are processed directly on this computer. YouTube links are processed by yt-dlp. Google Drive sync is handled by Google Drive Desktop.
setup.welcome.accept_privacy=I read and accept the Privacy Policy and local usage terms.
setup.welcome.existing_config=An existing configuration file was detected. Do you want to import its settings?
setup.welcome.import_btn=Import Existing Settings

setup.mode.title=Choose Setup Mode
setup.mode.desc=Select the role for this computer. Choose simple local if you do not use Google Drive.
setup.mode.local_mac.title=Simple Local Mac
setup.mode.local_mac.desc=One Mac only. No Google Drive required. Downloads go directly to Apple Music.
setup.mode.local_win.title=Simple Local Windows
setup.mode.local_win.desc=One Windows PC only. No Google Drive required. Downloads go to Windows Apple Music directory.
setup.mode.master_mac.title=Mac Master + Google Drive Sync
setup.mode.master_mac.desc=Mac imports to Apple Music. Other secondary machines download to shared Ready folder. Mac imports them.
setup.mode.master_win.title=Windows Master + Google Drive Sync
setup.mode.master_win.desc=Windows PC imports to Apple Music. Other secondary machines download to shared Ready folder.
setup.mode.secondary.title=Secondary Downloader
setup.mode.secondary.desc=Downloads to shared Google Drive Ready folder. Master machine imports later.
setup.mode.custom.title=Custom Configuration
setup.mode.custom.desc=Advanced manually configured paths.

