setup.folders.work_dir=作業ディレクトリ:
setup.folders.gdrive_root=Google ドライブのルート:
setup.folders.ready_dir=Ready ディレクトリ (共有):
setup.folders.imported_dir=Imported ディレクトリ (共有):
setup.folders.failed_dir=Failed ディレクトリ (共有):
setup.folders.apple_music_dir=Apple Music 自動追加フォルダ:
setup.folders.archive_file=アーカイブファイル (重複防止):
setup.folders.detect_btn=フォルダ検出を再実行
setup.folders.path_valid=有効なパスです
setup.folders.path_invalid=無効なパス、または存在しません

setup.telegram.title=Telegram ボット (オプション)
setup.telegram.desc=リモートからダウンロードをキューに入れるための Telegram ボットを設定します。ボットはこのアプリの内部でローカルに動作します。
setup.telegram.enable=Telegram ボットを有効にする
setup.telegram.token=ボットトークン:
setup.telegram.username=ボットのユーザー名:
setup.telegram.allowed_ids=許可された Telegram ユーザー ID (カンマ区切り):
setup.telegram.steps=1. Telegram を開きます。\n2. @BotFather を検索します。\n3. /newbot を送信し、指示に従います。\n4. ボットトークンをコピーしてここに貼り付けます。\n5. @userinfobot を検索してユーザー ID を取得します。
setup.telegram.test_btn=Telegram ボットのテスト
setup.telegram.test_success=ボットの接続に成功しました！ ユーザー名:
setup.telegram.test_failed=接続に失敗しました。トークンを確認してください。

setup.extension.title=ブラウザ拡張機能の設定
setup.extension.desc=ブラウザ拡張機能は YouTube にインラインのダウンロードボタンを追加します。
setup.extension.instructions=拡張機能をインストールするには:\n1. ブラウザの拡張機能設定 (chrome://extensions または edge://extensions) を開きます。\n2. 「デベロッパーモード」を有効にします (右上)。\n3. 「パッケージ化されていない拡張機能を読み込む」をクリックします。\n4. このプロジェクトのフォルダ内にある browser-extension ディレクトリを選択します。
setup.extension.path_label=拡張機能フォルダのパス:
setup.extension.copy_path=パスをコピー
setup.extension.open_chrome=Chrome 拡張機能ページを開く
setup.extension.open_edge=Edge 拡張機能ページを開く
setup.extension.test_btn=拡張機能の接続テスト
setup.extension.test_prompt=ブラウザのツールバーにある拡張機能のポップアップを開き、[テスト] をクリックしてください。
setup.extension.test_success=拡張機能が正常に接続されました！
setup.extension.test_failed=接続できませんでした。拡張機能が読み込まれ、ポップアップが開いていることを確認してください。

setup.autostart.title=自動起動の設定
setup.autostart.desc=ログイン時にアプリケーションを自動的に起動するかどうかを設定します。
setup.autostart.enable=ログイン時に DataSync を自動的に起動する
setup.autostart.minimized=バックグラウンドで最小化して起動する
setup.autostart.open_browser=起動時にローカル Web UI を開く

